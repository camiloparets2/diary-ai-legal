name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: legal-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VITE_OPERATOR_NAME: CI Test Operator
      VITE_SUPPORT_EMAIL: support@example.invalid
      VITE_MAILING_ADDRESS: CI test address
      VITE_EFFECTIVE_DATE: 2026-07-15
      VITE_BACKUP_RETENTION_DAYS: 30
      VITE_APPWRITE_ENDPOINT: https://nyc.cloud.appwrite.io/v1
      VITE_APPWRITE_PROJECT_ID: ci-project
      VITE_APPWRITE_API_FUNCTION_ID: diary-api
      VITE_LEGAL_REVIEWED: 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
